services:
  lywsd03mmc-passive:
    build: .
    image: sydneymrcat/mitemperature:latest
    container_name: mitemperature
    network_mode: host
    restart: unless-stopped
    ports:
      - "8745:8745"
    env_file:
      - .env
    cap_add:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - seccomp=unconfined
